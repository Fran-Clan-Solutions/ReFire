<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <title>Admin Review - ReFire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/chef_logo.png">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

  <!-- Bootstrap CSS & JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Dark Mode Toggle Script -->
  <script>
    (() => {
      const storedTheme = localStorage.getItem('theme');
      const getPreferredTheme = () => storedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      const setTheme = (theme) => {
        document.documentElement.setAttribute('data-bs-theme', theme);
      };

      setTheme(getPreferredTheme());

      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
          toggle.addEventListener('click', () => {
            const theme = toggle.getAttribute('data-bs-theme-value');
            localStorage.setItem('theme', theme);
            setTheme(theme);
          });
        });
      });
    })();
  </script>

  <style>
    body {
      background-color: var(--bs-body-bg);
    }
    .page-container {
      max-width: 720px;
    }
    .lock-container {
      max-width: 400px;
    }
    .logo-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .logo-title img {
      height: 40px;
      width: 40px;
    }
    .logo-text {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .recipe-name-input:focus {
      box-shadow: none;
      background-color: var(--bs-tertiary-bg);
    }
    .company-logo {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 6px;
      background-color: white;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 999;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

  <!-- Home Button -->
  <a href="index.html" class="btn btn-outline-secondary btn-sm position-fixed top-0 end-0 m-3" style="z-index: 1000;">← Home</a>

  <!-- Dark Mode Dropdown -->
  <div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3">
    <button class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center" id="bd-theme" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Toggle theme">
      <svg class="bi me-2" width="1em" height="1em"><use href="#circle-half"/></svg>
      <span>Theme</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow">
      <li><button type="button" class="dropdown-item" data-bs-theme-value="light">Light</button></li>
      <li><button type="button" class="dropdown-item" data-bs-theme-value="dark">Dark</button></li>
      <li><button type="button" class="dropdown-item active" data-bs-theme-value="auto">Auto</button></li>
    </ul>
  </div>

  <!-- Lock Screen -->
  <div id="lockScreen" class="lock-container bg-white rounded shadow p-4 mx-3">
    <h1 class="h3 mb-3 fw-normal text-center logo-title">
      <img src="/images/chef_logo.png" alt="Chef Logo" style="height:40px; width:40px;">
      <span class="logo-text">Admin</span>
    </h1>
    <label for="admin_key_input" class="form-label">Admin Key</label>
    <input type="password" class="form-control mb-2" id="admin_key_input" placeholder="Enter admin key" autocomplete="off">
    <div id="unlockError" class="text-danger small mb-2 d-none"></div>
    <button class="btn btn-primary w-100" id="unlockBtn" type="button">Unlock</button>
  </div>

  <!-- Admin Content -->
  <div id="adminContent" class="page-container w-100 mx-3 d-none">
    <div class="bg-white rounded shadow p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">
          Pending Submissions <span class="badge bg-secondary" id="pendingCount">0</span>
        </h1>
        <button class="btn btn-outline-secondary btn-sm" id="lockBtn" type="button">Lock</button>
      </div>

      <div id="pendingList"></div>
    </div>
  </div>

  <!-- Theme Icons -->
  <svg xmlns="http://www.w3.org/2000/svg" class="d-none">
    <symbol id="circle-half" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 0 8 1v14zM8 0a8 8 0 1 1 0 16z"/></symbol>
  </svg>

  <!-- Company Logo -->
  <img src="/images/Fran_Clan_Solutions_Logo.png" alt="Company Logo" class="company-logo">

  <script src="admin.js"></script>
</body>
</html>
