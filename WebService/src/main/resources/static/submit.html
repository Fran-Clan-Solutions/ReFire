<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8">
  <title>Submit a Recipe - ReFire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/chef_logo.png">

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js" crossorigin="anonymous"></script>

  <!-- Bootstrap CSS & JS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Dark Mode Toggle Script -->
  <script>
    (() => {
      const storedTheme = localStorage.getItem('theme');
      const getPreferredTheme = () => storedTheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

      const setTheme = (theme) => {
        document.documentElement.setAttribute('data-bs-theme', theme);
      };

      setTheme(getPreferredTheme());

      window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('[data-bs-theme-value]').forEach(toggle => {
          toggle.addEventListener('click', () => {
            const theme = toggle.getAttribute('data-bs-theme-value');
            localStorage.setItem('theme', theme);
            setTheme(theme);
          });
        });
      });
    })();
  </script>

  <style>
    body {
      background-color: var(--bs-body-bg);
    }
    .form-container {
      max-width: 560px;
      padding: 2rem;
    }
    .logo-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .logo-title img {
      height: 50px;
      width: 50px;
    }
    .logo-text {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .company-logo {
      position: fixed;
      top: 10px;
      left: 10px;
      width: 50px;
      height: 50px;
      object-fit: contain;
      border-radius: 6px;
      background-color: white;
      padding: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 999;
    }
    .ingredient-badge {
      margin: 0.25rem;
    }
    .step-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .step-number {
      font-weight: bold;
      min-width: 1.75rem;
      text-align: right;
    }
    #ingredient_suggestions {
      z-index: 1000;
    }
  </style>
</head>

<body class="d-flex align-items-center justify-content-center min-vh-100">

  <!-- Dark Mode Dropdown -->
  <div class="dropdown position-fixed bottom-0 end-0 mb-3 me-3">
    <button class="btn btn-bd-primary py-2 dropdown-toggle d-flex align-items-center" id="bd-theme" type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Toggle theme">
      <svg class="bi me-2" width="1em" height="1em"><use href="#circle-half"/></svg>
      <span>Theme</span>
    </button>
    <ul class="dropdown-menu dropdown-menu-end shadow">
      <li><button type="button" class="dropdown-item" data-bs-theme-value="light">Light</button></li>
      <li><button type="button" class="dropdown-item" data-bs-theme-value="dark">Dark</button></li>
      <li><button type="button" class="dropdown-item active" data-bs-theme-value="auto">Auto</button></li>
    </ul>
  </div>

  <main class="form-container bg-white rounded shadow p-4">
    <h1 class="h3 mb-1 fw-normal text-center logo-title">
      <img src="/images/chef_logo.png" alt="Chef Logo">
      <span class="logo-text">
        <span class="text-danger">Re</span><span class="text-primary">Fire</span>
      </span>
    </h1>
    <p class="text-center text-secondary-emphasis mb-4">Submit a Recipe</p>

    <div id="formAlert" class="alert d-none" role="alert"></div>

    <form id="submitForm" onsubmit="return false;">
      <div class="mb-3">
        <label for="recipe_name" class="form-label">Recipe Name</label>
        <input type="text" class="form-control" id="recipe_name" placeholder="e.g. Spaghetti Carbonara">
      </div>

      <div class="row mb-3">
        <div class="col-7">
          <label for="meal_type" class="form-label">Meal Type</label>
          <select class="form-select" id="meal_type">
            <option value="" selected disabled>Choose...</option>
            <option value="BREAKFAST">Breakfast</option>
            <option value="LUNCH">Lunch</option>
            <option value="DINNER">Dinner</option>
            <option value="SNACK">Snack</option>
          </select>
        </div>
        <div class="col-5">
          <label for="cook_time" class="form-label">Cook Time (min)</label>
          <input type="number" class="form-control" id="cook_time" min="1" placeholder="20">
        </div>
      </div>

      <div class="mb-3">
        <label for="ingredient_input" class="form-label">Ingredients</label>
        <div class="position-relative">
          <div class="input-group">
            <input type="text" class="form-control" id="ingredient_input" placeholder="e.g. garlic" autocomplete="off">
            <button class="btn btn-outline-secondary" type="button" onclick="addIngredient()">Add</button>
          </div>
        </div>
        <div id="ingredient_list" class="d-flex flex-wrap mt-2"></div>
      </div>

      <div class="mb-3">
        <label class="form-label">Instructions</label>
        <div id="steps_container"></div>
        <button class="btn btn-outline-secondary btn-sm mt-1" type="button" onclick="addStep()">+ Add Step</button>
      </div>

      <button class="btn btn-success w-100" type="button" onclick="submitRecipe()">Submit Recipe</button>
      <p class="text-secondary-emphasis small text-center mt-2 mb-0">Your recipe will be reviewed before it's added.</p>
    </form>
  </main>

  <!-- Theme Icons -->
  <svg xmlns="http://www.w3.org/2000/svg" class="d-none">
    <symbol id="circle-half" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 0 8 1v14zM8 0a8 8 0 1 1 0 16z"/></symbol>
  </svg>

  <!-- Company Logo -->
  <img src="/images/Fran_Clan_Solutions_Logo.png" alt="Company Logo" class="company-logo">

  <script src="submit.js"></script>
</body>
</html>
